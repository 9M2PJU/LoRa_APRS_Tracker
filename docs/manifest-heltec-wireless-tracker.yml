name: 9M2PJU Mod LoRa APRS Tracker (Heltec Wireless Tracker)
builds:
  - name: heltec_wireless_tracker
    chip_family: esp32s3
    variants:
      - heltec_wireless_tracker
    raw:
      - offset: 0x0
        path: https://raw.githubusercontent.com/9M2PJU/LoRa_APRS_Tracker/main/firmware/heltec_wireless_tracker/bootloader.bin
      - offset: 0x8000
        path: https://raw.githubusercontent.com/9M2PJU/LoRa_APRS_Tracker/main/firmware/heltec_wireless_tracker/partitions.bin
      - offset: 0xe000
        path: https://raw.githubusercontent.com/9M2PJU/LoRa_APRS_Tracker/main/firmware/heltec_wireless_tracker/boot_app0.bin
      - offset: 0x10000
        path: https://raw.githubusercontent.com/9M2PJU/LoRa_APRS_Tracker/main/firmware/heltec_wireless_tracker/firmware.bin
